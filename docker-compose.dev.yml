services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: scrumhub-backend-dev
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - backend/.env
    environment:
      - NODE_ENV=development
      - PORT=3000
    command: npm run dev
    networks:
      - scrumhub-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: scrumhub-frontend-dev
    ports:
      - "8080:8080"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/package.json:/app/package.json
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json
      - node_modules:/app/node_modules
    env_file:
      - backend/.env
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:3000/api
    depends_on:
      - backend
    command: npm run dev
    networks:
      - scrumhub-network

networks:
  scrumhub-network:
    driver: bridge

volumes:
  node_modules: