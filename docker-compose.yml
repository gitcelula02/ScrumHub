services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scrumhub-backend
    ports:
      - "3000:3000"
    env_file:
      - backend/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - scrumhub-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scrumhub-frontend
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://localhost:3000/api
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - scrumhub-network

networks:
  scrumhub-network:
    driver: bridge