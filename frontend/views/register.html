<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - TaskFlow</title>
    <link rel="stylesheet" href="/css/login.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
</head>
<body>
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <h1>
                    <div class="logo-icon-small">📋</div>
                    TaskFlow
                </h1>
            </div>

            <div id="alert" class="alert"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Nombre completo</label>
                    <div class="input-icon" data-icon="👤">
                        <input type="text" id="name" placeholder="Tu nombre" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <div class="input-icon" data-icon="✉️">
                        <input type="email" id="email" placeholder="tu@email.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-icon" data-icon="🔒">
                        <input type="password" id="password" placeholder="••••••••" minlength="6" required>
                    </div>
                </div>
                <button type="submit" class="btn-login">Crear Cuenta</button>
            </form>

            <div class="divider">
                <span>o regístrate con</span>
            </div>

            <div class="social-login">
                <button class="social-btn" title="Google">G</button>
                <button class="social-btn" title="GitHub">GH</button>
                <button class="social-btn" title="Microsoft">M</button>
            </div>

            <p class="footer-text">
                ¿Ya tienes cuenta? <a href="/login">Inicia sesión</a>
            </p>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        checkAuth().then(user => {
            if (user) {
                window.location.href = '/dashboard';
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alert = document.getElementById('alert');
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await register(name, email, password);
                
                if (response.success) {
                    alert.className = 'alert success show';
                    alert.textContent = '✨ Cuenta creada exitosamente. Redirigiendo...';
                    setTimeout(() => window.location.href = '/dashboard', 1200);
                } else {
                    alert.className = 'alert error show';
                    alert.textContent = '❌ ' + (response.message || 'Error al registrar');
                    setTimeout(() => alert.classList.remove('show'), 3000);
                }
            } catch (error) {
                alert.className = 'alert error show';
                alert.textContent = '⚠️ Error de conexión. Intenta de nuevo.';
                setTimeout(() => alert.classList.remove('show'), 3000);
            }
        });
    </script>
</body>
</html>
