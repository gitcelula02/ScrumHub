<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TaskFlow</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/@emoji-mart/data"></script>
    <script src="https://cdn.jsdelivr.net/npm/emoji-mart@latest/dist/browser.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="/dashboard" class="sidebar-logo">
                    <span>📋</span> TaskFlow
                </a>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Principal</div>
                    <a href="/dashboard" class="nav-item active">
                        <span class="nav-item-icon">🏠</span>
                        Inicio
                    </a>
                    <a href="#" class="nav-item" onclick="showMyTasks()">
                        <span class="nav-item-icon">📋</span>
                        Mis Tareas
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Proyectos</div>
                    <div id="projectsList" class="projects-list"></div>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="user-profile" onclick="window.location.href='/profile'">
                    <div class="user-avatar" id="userAvatar">👤</div>
                    <div class="user-info">
                        <div class="user-name" id="userName">Usuario</div>
                        <div class="user-role">Miembro</div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="topbar-left">
                    <h1 class="page-title">Dashboard</h1>
                </div>
                <div class="topbar-actions">
                    <div class="search-box">
                        <span>🔍</span>
                        <input type="text" placeholder="Buscar proyectos..." id="searchInput">
                    </div>
                    <button class="icon-btn" title="Notificaciones">🔔</button>
                    <button class="icon-btn" title="Configuración">⚙️</button>
                    <button class="btn-new-project" onclick="openModal('newProject')">
                        + Nuevo Proyecto
                    </button>
                </div>
            </header>

            <div class="content-area">
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total de Tareas</h3>
                        <div class="stat-value" id="statTotal">0</div>
                        <div class="stat-change">En todos tus proyectos</div>
                    </div>
                    <div class="stat-card">
                        <h3>Completadas</h3>
                        <div class="stat-value success" id="statDone">0</div>
                        <div class="stat-change">Este mes</div>
                    </div>
                    <div class="stat-card">
                        <h3>En Progreso</h3>
                        <div class="stat-value warning" id="statInProgress">0</div>
                        <div class="stat-change">Activas ahora</div>
                    </div>
                    <div class="stat-card">
                        <h3>Vencidas</h3>
                        <div class="stat-value error" id="statOverdue">0</div>
                        <div class="stat-change">Requieren atención</div>
                    </div>
                </div>

                <div class="section-header">
                    <h2>📁 Tus Proyectos</h2>
                </div>

                <div id="projectsGrid" class="projects-grid"></div>

                <!-- Chatbot Popup -->
                <div class="chatbot-popup">
                    <div class="chat-header">
                        <div class="header-info">
                            <svg class="chatbot-logo" xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 1024 1024">
                                <path d="M738.3 287.6H285.7c-59 0-106.8 47.8-106.8 106.8v303.1c0 59 47.8 106.8 106.8 106.8h81.5v111.1c0 .7.8 1.1 1.4.7l166.9-110.6 41.8-.8h117.4l43.6-.4c59 0 106.8-47.8 106.8-106.8V394.5c0-59-47.8-106.9-106.8-106.9zM351.7 448.2c0-29.5 23.9-53.5 53.5-53.5s53.5 23.9 53.5 53.5-23.9 53.5-53.5 53.5-53.5-23.9-53.5-53.5zm157.9 267.1c-67.8 0-123.8-47.5-132.3-109h264.6c-8.6 61.5-64.5 109-132.3 109zm110-213.7c-29.5 0-53.5-23.9-53.5-53.5s23.9-53.5 53.5-53.5 53.5 23.9 53.5 53.5-23.9 53.5-53.5 53.5zM867.2 644.5V453.1h26.5c19.4 0 35.1 15.7 35.1 35.1v121.1c0 19.4-15.7 35.1-35.1 35.1h-26.5zM95.2 609.4V488.2c0-19.4 15.7-35.1 35.1-35.1h26.5v191.3h-26.5c-19.4 0-35.1-15.7-35.1-35.1zM561.5 149.6c0 23.4-15.6 43.3-36.9 49.7v44.9h-30v-44.9c-21.4-6.5-36.9-26.3-36.9-49.7 0-28.6 23.3-51.9 51.9-51.9s51.9 23.3 51.9 51.9z"></path>
                            </svg>
                            <h2 class="logo-text">Chatbot</h2>
                        </div>
                        <button id="close-chatbot" class="material-symbols-rounded">keyboard_arrow_down</button>
                    </div>
                    <div class="chat-body">
                        <div class="message bot-message">
                            <svg class="bot-avatar" xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 1024 1024">
                                <path d="M738.3 287.6H285.7c-59 0-106.8 47.8-106.8 106.8v303.1c0 59 47.8 106.8 106.8 106.8h81.5v111.1c0 .7.8 1.1 1.4.7l166.9-110.6 41.8-.8h117.4l43.6-.4c59 0 106.8-47.8 106.8-106.8V394.5c0-59-47.8-106.9-106.8-106.9zM351.7 448.2c0-29.5 23.9-53.5 53.5-53.5s53.5 23.9 53.5 53.5-23.9 53.5-53.5 53.5-53.5-23.9-53.5-53.5zm157.9 267.1c-67.8 0-123.8-47.5-132.3-109h264.6c-8.6 61.5-64.5 109-132.3 109zm110-213.7c-29.5 0-53.5-23.9-53.5-53.5s23.9-53.5 53.5-53.5 53.5 23.9 53.5 53.5-23.9 53.5-53.5 53.5zM867.2 644.5V453.1h26.5c19.4 0 35.1 15.7 35.1 35.1v121.1c0 19.4-15.7 35.1-35.1 35.1h-26.5zM95.2 609.4V488.2c0-19.4 15.7-35.1 35.1-35.1h26.5v191.3h-26.5c-19.4 0-35.1-15.7-35.1-35.1zM561.5 149.6c0 23.4-15.6 43.3-36.9 49.7v44.9h-30v-44.9c-21.4-6.5-36.9-26.3-36.9-49.7 0-28.6 23.3-51.9 51.9-51.9s51.9 23.3 51.9 51.9z"></path>
                            </svg>
                            <div class="message-text">Hola!👋 <br /> ¿Cómo puedo ayudarte hoy?</div>
                        </div>
                    </div>
                    <div class="chat-footer">
                        <form action="#" class="chat-form">
                            <textarea placeholder="Message..." class="message-input" required></textarea>
                            <div class="chat-controls">
                                <button type="button" id="emoji-picker" class="material-symbols-outlined">sentiment_satisfied</button>
                                <div class="file-upload-wrapper">
                                    <input type="file" accept="images/*" id="file-input" hidden>
                                    <img src="#">
                                    <button type="button" id="file-upload" class="material-symbols-rounded">attach_file</button>
                                    <button type="button" id="file-cancel" class="material-symbols-rounded">close</button>
                                </div>
                                <button type="submit" id="send-message" class="material-symbols-rounded">arrow_upward</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Chatbot Toggle Button -->
                <button id="chatbot-toggler" class="chatbot-toggle-btn">
                    <svg class="chatbot-toggle-icon" xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 1024 1024">
                        <path d="M738.3 287.6H285.7c-59 0-106.8 47.8-106.8 106.8v303.1c0 59 47.8 106.8 106.8 106.8h81.5v111.1c0 .7.8 1.1 1.4.7l166.9-110.6 41.8-.8h117.4l43.6-.4c59 0 106.8-47.8 106.8-106.8V394.5c0-59-47.8-106.9-106.8-106.9zM351.7 448.2c0-29.5 23.9-53.5 53.5-53.5s53.5 23.9 53.5 53.5-23.9 53.5-53.5 53.5-53.5-23.9-53.5-53.5zm157.9 267.1c-67.8 0-123.8-47.5-132.3-109h264.6c-8.6 61.5-64.5 109-132.3 109zm110-213.7c-29.5 0-53.5-23.9-53.5-53.5s23.9-53.5 53.5-53.5 53.5 23.9 53.5 53.5-23.9 53.5-53.5 53.5zM867.2 644.5V453.1h26.5c19.4 0 35.1 15.7 35.1 35.1v121.1c0 19.4-15.7 35.1-35.1 35.1h-26.5zM95.2 609.4V488.2c0-19.4 15.7-35.1 35.1-35.1h26.5v191.3h-26.5c-19.4 0-35.1-15.7-35.1-35.1zM561.5 149.6c0 23.4-15.6 43.3-36.9 49.7v44.9h-30v-44.9c-21.4-6.5-36.9-26.3-36.9-49.7 0-28.6 23.3-51.9 51.9-51.9s51.9 23.3 51.9 51.9z"></path>
                    </svg>
                </button>
            </div>
        </main>
    </div>

    <!-- Modal Nuevo Proyecto -->
    <div class="modal-overlay" id="modalNewProject">
        <div class="modal">
            <div class="modal-header">
                <h2>✨ Crear Nuevo Proyecto</h2>
                <button class="modal-close" onclick="closeModal('newProject')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="projectForm">
                    <div class="form-group">
                        <label>Nombre del proyecto</label>
                        <input type="text" id="projectName" placeholder="Ej: Desarrollo App Móvil" required>
                    </div>
                    <div class="form-group">
                        <label>Descripción</label>
                        <textarea id="projectDescription" rows="3" placeholder="Describe el proyecto..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Color del proyecto</label>
                        <div class="color-picker">
                            <div class="color-option selected" data-color="#0904DB" style="background: #0904DB;"></div>
                            <div class="color-option" data-color="#9604DB" style="background: #9604DB;"></div>
                            <div class="color-option" data-color="#5004DB" style="background: #5004DB;"></div>
                            <div class="color-option" data-color="#A98CDE" style="background: #A98CDE;"></div>
                            <div class="color-option" data-color="#22c55e" style="background: #22c55e;"></div>
                            <div class="color-option" data-color="#f59e0b" style="background: #f59e0b;"></div>
                            <div class="color-option" data-color="#ef4444" style="background: #ef4444;"></div>
                            <div class="color-option" data-color="#3b82f6" style="background: #3b82f6;"></div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('newProject')">Cancelar</button>
                <button class="btn btn-primary" onclick="createNewProject()">Crear Proyecto</button>
            </div>
        </div>
    </div>

    <!--
        ORDEN DE CARGA CORRECTO:
        1. api.js      → define checkAuth, login, logout, showToast
        2. projects.js → define window.ProjectAPI
        3. tasks.js    → define window.TaskAPI, window.TaskHelpers
        4. Script inline → usa ProjectAPI y TaskAPI
        5. chatbot.js  → usa ProjectAPI (debe cargarse al final)
    -->
    <script src="/js/api.js"></script>
    <script src="/js/projects.js"></script>
    <script src="/js/tasks.js"></script>
    <script>
        let projects = [];

        async function init() {
            const user = await checkAuth();
            if (!user) {
                window.location.href = '/login';
                return;
            }

            document.getElementById('userName').textContent = user.name;
            document.getElementById('userAvatar').textContent = user.avatar || '👤';

            // Verificar que los APIs estén disponibles
            if (typeof ProjectAPI === 'undefined') {
                console.error('ProjectAPI no disponible. Verifica el orden de carga de scripts.');
                showToast('Error cargando la aplicación. Recarga la página.', 'error');
                return;
            }

            await loadProjects();
            await loadStats();
        }

        async function loadProjects() {
            try {
                const response = await ProjectAPI.getAll();
                if (response.success) {
                    projects = response.projects;
                    renderProjects();
                    renderSidebarProjects();
                } else {
                    console.error('Error cargando proyectos:', response.message);
                    showToast('Error al cargar proyectos: ' + response.message, 'error');
                }
            } catch (err) {
                console.error('Error en loadProjects:', err);
                showToast('Error de conexión al cargar proyectos', 'error');
            }
        }

        async function loadStats() {
            try {
                const response = await TaskAPI.getStats();
                if (response.success) {
                    const stats = response.stats;
                    document.getElementById('statTotal').textContent = stats.total || 0;
                    document.getElementById('statDone').textContent = stats.done || 0;
                    document.getElementById('statInProgress').textContent = stats.inProgress || 0;
                    document.getElementById('statOverdue').textContent = stats.overdue || 0;
                }
            } catch (err) {
                console.error('Error en loadStats:', err);
            }
        }

        function renderProjects() {
            const grid = document.getElementById('projectsGrid');

            if (!projects || projects.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 80px 40px; color: var(--text-secondary); background: var(--bg-card); border-radius: 24px; border: 2px dashed var(--border);">
                        <div style="font-size: 72px; margin-bottom: 20px;">📁</div>
                        <h3 style="font-size: 24px; margin-bottom: 12px; color: var(--text-primary);">No tienes proyectos aún</h3>
                        <p style="margin-bottom: 24px;">Crea tu primer proyecto para comenzar a organizar tu trabajo</p>
                        <button class="btn btn-primary" onclick="openModal('newProject')">+ Crear Proyecto</button>
                    </div>
                `;
                return;
            }

            grid.innerHTML = projects.map(project => {
                const stats = project.stats || { total: 0, done: 0 };
                const progress = stats.total > 0
                    ? Math.round((stats.done / stats.total) * 100)
                    : 0;
                const color = project.color || '#0904DB';

                return `
                    <div class="project-card" onclick="window.location.href='/project/${project.id}'">
                        <div class="project-card-header">
                            <div class="project-icon" style="background: linear-gradient(135deg, ${color}22, ${color}44);">
                                <span style="font-size: 28px;">${project.icon || '📁'}</span>
                            </div>
                            <span class="project-menu">⋯</span>
                        </div>
                        <h3>${project.name}</h3>
                        <p>${project.description || 'Sin descripción'}</p>
                        <div class="project-progress">
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${progress}%; background: linear-gradient(90deg, ${color}, #9604DB);"></div>
                            </div>
                            <div class="progress-text">${progress}% completado · ${stats.done}/${stats.total} tareas</div>
                        </div>
                        <div class="project-meta">
                            <div class="project-members">
                                ${(project.members || []).slice(0, 4).map(m => `
                                    <div class="member-avatar" title="${m.name}">${m.avatar || '👤'}</div>
                                `).join('')}
                                ${(project.members || []).length > 4
                                    ? `<div class="member-avatar" style="background: var(--secondary);">+${project.members.length - 4}</div>`
                                    : ''}
                            </div>
                            <div class="project-stats">
                                <span>📋 ${stats.total}</span>
                                <span>✅ ${stats.done}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderSidebarProjects() {
            const list = document.getElementById('projectsList');
            list.innerHTML = (projects || []).map(project => `
                <div class="project-item" onclick="window.location.href='/project/${project.id}'">
                    <span class="project-color" style="background: ${project.color || '#667eea'};"></span>
                    <span>${project.name}</span>
                </div>
            `).join('');
        }

        function openModal(type) {
            const modalId = 'modal' + type.charAt(0).toUpperCase() + type.slice(1);
            const modal = document.getElementById(modalId);
            if (modal) {
                modal.classList.add('active');
                // Configurar color picker
                document.querySelectorAll('.color-option').forEach(opt => {
                    opt.onclick = () => {
                        document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
                        opt.classList.add('selected');
                    };
                });
            }
        }

        function closeModal(type) {
            const modalId = 'modal' + type.charAt(0).toUpperCase() + type.slice(1);
            const modal = document.getElementById(modalId);
            if (modal) modal.classList.remove('active');
        }

        async function createNewProject() {
            const name = document.getElementById('projectName').value.trim();
            const description = document.getElementById('projectDescription').value.trim();
            const colorEl = document.querySelector('.color-option.selected');
            const color = colorEl ? colorEl.dataset.color : '#0904DB';

            if (!name) {
                showToast('El nombre es requerido', 'error');
                return;
            }

            try {
                const response = await ProjectAPI.create({ name, description, color });

                if (response.success) {
                    showToast('✨ Proyecto creado exitosamente');
                    closeModal('newProject');
                    document.getElementById('projectForm').reset();
                    // Reset color picker
                    document.querySelectorAll('.color-option').forEach((o, i) => {
                        o.classList.toggle('selected', i === 0);
                    });
                    await loadProjects();
                    await loadStats();
                } else {
                    showToast(response.message || 'Error al crear proyecto', 'error');
                    console.error('Error creating project:', response);
                }
            } catch (err) {
                console.error('Error en createNewProject:', err);
                showToast('Error de conexión', 'error');
            }
        }

        async function showMyTasks() {
            const response = await TaskAPI.getMyTasks();
            console.log('Mis tareas:', response);
        }

        // Búsqueda en tiempo real
        document.getElementById('searchInput').addEventListener('input', function() {
            const term = this.value.toLowerCase();
            const filtered = projects.filter(p =>
                p.name.toLowerCase().includes(term) ||
                (p.description || '').toLowerCase().includes(term)
            );
            const grid = document.getElementById('projectsGrid');
            // Render temporal con proyectos filtrados
            const orig = projects;
            projects = filtered;
            renderProjects();
            projects = orig;
        });

        // Iniciar app
        init();
    </script>
    <script src="/js/chatbot.js"></script>
</body>
</html>
