<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TaskFlow</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="/dashboard" class="sidebar-logo">
                    <span>📋</span> TaskFlow
                </a>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Principal</div>
                    <a href="/dashboard" class="nav-item active">
                        <span class="nav-item-icon">🏠</span>
                        Inicio
                    </a>
                    <a href="#" class="nav-item" onclick="showMyTasks()">
                        <span class="nav-item-icon">📋</span>
                        Mis Tareas
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Proyectos</div>
                    <div id="projectsList" class="projects-list"></div>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="user-profile" onclick="window.location.href='/profile'">
                    <div class="user-avatar" id="userAvatar">👤</div>
                    <div class="user-info">
                        <div class="user-name" id="userName">Usuario</div>
                        <div class="user-role">Miembro</div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="topbar-left">
                    <h1 class="page-title">Dashboard</h1>
                </div>
                <div class="topbar-actions">
                    <div class="search-box">
                        <span>🔍</span>
                        <input type="text" placeholder="Buscar..." onkeyup="filterCards(this.value)">
                    </div>
                    <button class="icon-btn" title="Notificaciones">🔔</button>
                    <button class="icon-btn" title="Configuración">⚙️</button>
                    <button class="btn-new-project" onclick="openModal('newProject')">
                        + Nuevo Proyecto
                    </button>
                </div>
            </header>

            <div class="content-area">
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total de Tareas</h3>
                        <div class="stat-value" id="statTotal">0</div>
                        <div class="stat-change">En todos tus proyectos</div>
                    </div>
                    <div class="stat-card">
                        <h3>Completadas</h3>
                        <div class="stat-value success" id="statDone">0</div>
                        <div class="stat-change">Este mes</div>
                    </div>
                    <div class="stat-card">
                        <h3>En Progreso</h3>
                        <div class="stat-value warning" id="statInProgress">0</div>
                        <div class="stat-change">Activas ahora</div>
                    </div>
                    <div class="stat-card">
                        <h3>Vencidas</h3>
                        <div class="stat-value error" id="statOverdue">0</div>
                        <div class="stat-change">Requieren atención</div>
                    </div>
                </div>

                <div class="section-header">
                    <h2>📁 Tus Proyectos</h2>
                </div>
                <div id="projectsGrid" class="projects-grid"></div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="modalNewProject">
        <div class="modal">
            <div class="modal-header">
                <h2>✨ Crear Nuevo Proyecto</h2>
                <button class="modal-close" onclick="closeModal('newProject')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="projectForm">
                    <div class="form-group">
                        <label>Nombre del proyecto</label>
                        <input type="text" id="projectName" placeholder="Ej: Desarrollo App Móvil" required>
                    </div>
                    <div class="form-group">
                        <label>Descripción</label>
                        <textarea id="projectDescription" rows="3" placeholder="Describe el proyecto..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Color del proyecto</label>
                        <div class="color-picker">
                            <div class="color-option selected" data-color="#0904DB" style="background: #0904DB;"></div>
                            <div class="color-option" data-color="#9604DB" style="background: #9604DB;"></div>
                            <div class="color-option" data-color="#5004DB" style="background: #5004DB;"></div>
                            <div class="color-option" data-color="#A98CDE" style="background: #A98CDE;"></div>
                            <div class="color-option" data-color="#22c55e" style="background: #22c55e;"></div>
                            <div class="color-option" data-color="#f59e0b" style="background: #f59e0b;"></div>
                            <div class="color-option" data-color="#ef4444" style="background: #ef4444;"></div>
                            <div class="color-option" data-color="#3b82f6" style="background: #3b82f6;"></div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('newProject')">Cancelar</button>
                <button class="btn btn-primary" onclick="createNewProject()">Crear Proyecto</button>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/projects.js"></script>
    <script src="/js/tasks.js"></script>
    <script>
        let projects = [];

        async function init() {
            const user = await checkAuth();
            if (!user) {
                window.location.href = '/login';
                return;
            }

            document.getElementById('userName').textContent = user.name;
            document.getElementById('userAvatar').textContent = user.avatar;

            await loadStats();
            
            if (window.location.hash === '#my-tasks') {
                await showMyTasks();
                // Also need to load sidebar projects for the layout
                const response = await ProjectAPI.getAll();
                if (response.success) {
                    projects = response.projects;
                    renderSidebarProjects();
                }
            } else {
                await loadProjects();
            }
        }

        async function loadProjects() {
            const response = await ProjectAPI.getAll();
            if (response.success) {
                projects = response.projects;
                renderProjects();
                renderSidebarProjects();
            }
        }

        async function loadStats() {
            const response = await TaskAPI.getStats();
            if (response.success) {
                const stats = response.stats;
                document.getElementById('statTotal').textContent = stats.total;
                document.getElementById('statDone').textContent = stats.done;
                document.getElementById('statInProgress').textContent = stats.inProgress;
                document.getElementById('statOverdue').textContent = stats.overdue;
            }
        }

        function renderProjects() {
            const grid = document.getElementById('projectsGrid');

            if (projects.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 80px 40px; color: var(--text-secondary); background: var(--bg-card); border-radius: 24px; border: 2px dashed var(--border);">
                        <div style="font-size: 72px; margin-bottom: 20px;">📁</div>
                        <h3 style="font-size: 24px; margin-bottom: 12px; color: var(--text-primary);">No tienes proyectos aún</h3>
                        <p style="margin-bottom: 24px;">Crea tu primer proyecto para comenzar a organizar tu trabajo</p>
                        <button class="btn btn-primary" onclick="openModal('newProject')">+ Crear Proyecto</button>
                    </div>
                `;
                return;
            }

            grid.innerHTML = projects.map(project => {
                const progress = project.stats.total > 0
                    ? Math.round((project.stats.done / project.stats.total) * 100)
                    : 0;

                return `
                    <div class="project-card" onclick="window.location.href='/project/${project.id}'">
                        <div class="project-card-header">
                            <div class="project-icon" style="background: linear-gradient(135deg, ${project.color}22, ${project.color}44);">
                                <span style="font-size: 28px;">📁</span>
                            </div>
                            <span class="project-menu">⋯</span>
                        </div>
                        <h3>${project.name}</h3>
                        <p>${project.description || 'Sin descripción'}</p>
                        <div class="project-progress">
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${progress}%; background: linear-gradient(90deg, ${project.color || '#0904DB'}, ${project.color || '#9604DB'});"></div>
                            </div>
                            <div class="progress-text">${progress}% completado · ${project.stats.done}/${project.stats.total} tareas</div>
                        </div>
                        <div class="project-meta">
                            <div class="project-members">
                                ${project.members.slice(0, 4).map(m => `
                                    <div class="member-avatar" title="${m.name}">${m.avatar}</div>
                                `).join('')}
                                ${project.members.length > 4 ? `<div class="member-avatar" style="background: var(--secondary);">+${project.members.length - 4}</div>` : ''}
                            </div>
                            <div class="project-stats">
                                <span>📋 ${project.stats.total}</span>
                                <span>✅ ${project.stats.done}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderSidebarProjects() {
            const list = document.getElementById('projectsList');
            list.innerHTML = projects.map(project => `
                <div class="project-item" onclick="window.location.href='/project/${project.id}'">
                    <span class="project-color" style="background: ${project.color};"></span>
                    <span>${project.name}</span>
                </div>
            `).join('');
        }

        function openModal(type) {
            document.getElementById('modal' + type.charAt(0).toUpperCase() + type.slice(1)).classList.add('active');

            if (type === 'newProject') {
                document.querySelectorAll('.color-option').forEach(opt => {
                    opt.addEventListener('click', () => {
                        document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
                        opt.classList.add('selected');
                    });
                });
            }
        }

        function closeModal(type) {
            document.getElementById('modal' + type.charAt(0).toUpperCase() + type.slice(1)).classList.remove('active');
        }

        async function createNewProject() {
            const name = document.getElementById('projectName').value;
            const description = document.getElementById('projectDescription').value;
            const color = document.querySelector('.color-option.selected')?.dataset.color || '#0904DB';

            if (!name) {
                showToast('El nombre es requerido', 'error');
                return;
            }

            const response = await ProjectAPI.create({ name, description, color });

            if (response.success) {
                showToast('✨ Proyecto creado exitosamente');
                closeModal('newProject');
                await loadProjects();
                await loadStats();
                document.getElementById('projectForm').reset();
            } else {
                showToast(response.message || 'Error al crear proyecto', 'error');
            }
        }

        async function showMyTasks(event) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            if (event && event.currentTarget) {
                event.currentTarget.classList.add('active');
            } else {
                // Find Mis Tareas link and make active
                const links = document.querySelectorAll('.nav-item');
                for (let link of links) {
                    if (link.textContent.includes('Mis Tareas')) {
                        link.classList.add('active');
                        break;
                    }
                }
            }

            const sectionTitle = document.querySelector('.section-header h2');
            if (sectionTitle) sectionTitle.innerHTML = '📋 Mis Tareas';
            
            const grid = document.getElementById('projectsGrid');
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px;">Cargando tareas...</div>';
            
            const response = await TaskAPI.getMyTasks();
            
            if (response.success) {
                if (!response.tasks || response.tasks.length === 0) {
                    grid.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; padding: 80px 40px; color: var(--text-secondary); background: var(--bg-card); border-radius: 24px; border: 2px dashed var(--border);">
                            <div style="font-size: 72px; margin-bottom: 20px;">✅</div>
                            <h3 style="font-size: 24px; margin-bottom: 12px; color: var(--text-primary);">No tienes tareas asignadas</h3>
                            <p style="margin-bottom: 24px;">¡Todo al día!</p>
                        </div>
                    `;
                    return;
                }
                
                grid.innerHTML = response.tasks.map(task => {
                    const priorityClass = TaskHelpers.getPriorityClass(task.priority);
                    const statusText = TaskHelpers.getStatusText(task.status);
                    const statusIcon = TaskHelpers.getStatusIcon(task.status);
                    const date = TaskHelpers.formatDate(task.dueDate);
                    
                    return `
                        <div class="project-card" style="border-left: 4px solid var(--primary); cursor: pointer;" onclick="window.location.href='/project/${task.projectId}'">
                            <div class="project-card-header">
                                <span class="task-priority ${priorityClass}" style="font-size: 10px; padding: 4px 10px; border-radius: 8px; font-weight: 700; text-transform: uppercase;">
                                    ${task.priority}
                                </span>
                                <span class="status-badge" style="font-size: 12px; background: var(--bg-hover); padding: 4px 8px; border-radius: 12px;">
                                    ${statusIcon} ${statusText}
                                </span>
                            </div>
                            <h3 style="margin-top: 12px;">${task.title}</h3>
                            <p>${task.description || 'Sin descripción'}</p>
                            <div class="project-meta" style="margin-top: auto; padding-top: 16px; flex-direction: column; align-items: flex-start; gap: 8px;">
                                <div style="font-size: 12px; color: var(--text-secondary);">
                                    📅 Vencimiento: <span class="${task.dueDate && new Date(task.dueDate) < new Date() && task.status !== 'done' ? 'error' : ''}">${date || 'Sin fecha'}</span>
                                </div>
                                <div style="font-size: 12px; color: var(--text-secondary);">
                                    📁 Proyecto: ${task.projectData ? task.projectData.name : 'Desconocido'}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } else {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--error);">Error al cargar tareas</div>`;
            }
        }

        function filterCards(query) {
            const lowerQuery = query.toLowerCase();
            const cards = document.querySelectorAll('.project-card');
            
            cards.forEach(card => {
                const titleElement = card.querySelector('h3');
                const pElement = card.querySelector('p');
                
                const title = titleElement ? titleElement.textContent.toLowerCase() : '';
                const desc = pElement ? pElement.textContent.toLowerCase() : '';
                
                if (title.includes(lowerQuery) || desc.includes(lowerQuery)) {
                    card.style.display = ''; 
                } else {
                    card.style.display = 'none'; 
                }
            });

            // Also search in sidebar
            const sidebarItems = document.querySelectorAll('.projects-list .project-item');
            sidebarItems.forEach(item => {
                const title = item.textContent.toLowerCase();
                if (title.includes(lowerQuery)) {
                    item.style.display = '';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        init();
    </script>
</body>

</html>
